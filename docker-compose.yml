version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-loci}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-loci}
      - POSTGRES_DB=${POSTGRES_DB:-loci}
    ports:
      # 호스트에서 직접 psql / GUI 접속 가능하도록 — 운영에선 제거
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # backend 가 postgres 준비 완료 후에만 뜨도록
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loci} -d ${POSTGRES_DB:-loci}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # 컨테이너 간 통신은 서비스명(postgres) 을 호스트로 사용
      - DATABASE_URL=postgresql://${POSTGRES_USER:-loci}:${POSTGRES_PASSWORD:-loci}@postgres:5432/${POSTGRES_DB:-loci}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
